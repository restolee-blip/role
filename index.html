<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎭 우리반 역할놀이</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Nanum+Gothic:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--c1:#8B5E3C;--c2:#5C3A1E;--bg:#FFF8F0;--warm:#FFE4C4;--accent:#FF8C69;--green:#4CAF7D;--orange:#FF9800;--blue:#3B9EDB;--red:#E05A5A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nanum Gothic',sans-serif;background:var(--bg);min-height:100vh;}

/* 테마선택 */
#theme-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:linear-gradient(160deg,#FFF8F0,#FFE4C4);}
#theme-screen h1{font-family:'Jua',sans-serif;font-size:1.8rem;color:#5C3A1E;margin-bottom:6px;}
#theme-screen p{color:#8B5E3C;font-size:.9rem;margin-bottom:24px;}
.theme-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;width:100%;max-width:420px;}
.theme-card{background:white;border-radius:18px;padding:20px 12px;text-align:center;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.08);transition:transform .18s;}
.theme-card:hover{transform:translateY(-4px);}.theme-card:active{transform:scale(.96);}
.tc-icon{font-size:2.6rem;}.tc-name{font-family:'Jua',sans-serif;font-size:.95rem;margin-top:7px;color:#5C3A1E;}

/* 테마 추가 모달 */
#add-theme-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:600;align-items:flex-start;justify-content:center;overflow-y:auto;padding:20px;}
#add-theme-modal.show{display:flex;}
.atm-box{background:white;border-radius:24px;padding:24px 20px;width:100%;max-width:420px;margin:auto;animation:popIn .3s ease;}
.atm-box h2{font-family:'Jua',sans-serif;color:#5C3A1E;font-size:1.2rem;margin-bottom:16px;}
.atm-row{margin-bottom:12px;}
.atm-row label{display:block;font-size:.82rem;color:#8B5E3C;margin-bottom:4px;font-weight:700;}
.atm-row input,.atm-row select{width:100%;padding:10px 13px;border:2px solid #FFE4C4;border-radius:10px;font-family:'Nanum Gothic',sans-serif;font-size:.95rem;outline:none;background:#FFF8F0;}
.atm-row input:focus,.atm-row select:focus{border-color:#8B5E3C;}
.color-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:6px;}
.color-swatch{width:100%;aspect-ratio:1;border-radius:10px;border:3px solid transparent;cursor:pointer;transition:transform .15s;}
.color-swatch:hover{transform:scale(1.1);}
.color-swatch.selected{border-color:#333;transform:scale(1.1);}
.atm-btns{display:flex;gap:10px;margin-top:16px;}
.atm-btns button{flex:1;padding:13px;border:none;border-radius:12px;font-family:'Jua',sans-serif;font-size:.95rem;cursor:pointer;}
.atm-cancel{background:#FFE4C4;color:#8B5E3C;}
.atm-save{color:white;background:linear-gradient(135deg,#8B5E3C,#5C3A1E);}
.copy-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:6px;}
.copy-btn{padding:10px 8px;border:2px solid #FFE4C4;border-radius:10px;background:#FFF8F0;font-family:'Jua',sans-serif;font-size:.82rem;color:#5C3A1E;cursor:pointer;text-align:center;transition:all .15s;}
.copy-btn:hover{border-color:#8B5E3C;background:#FFE4C4;}
.copy-btn.selected{border-color:#8B5E3C;background:#FFE4C4;}
.add-theme-fab{display:block;margin:16px auto 0;padding:13px 28px;background:linear-gradient(135deg,#8B5E3C,#5C3A1E);color:white;border:none;border-radius:50px;font-family:'Jua',sans-serif;font-size:1rem;cursor:pointer;box-shadow:0 4px 14px rgba(139,94,60,.3);}
.theme-card-wrap{position:relative;}
.theme-del-btn{position:absolute;top:6px;right:6px;background:#FFE5E5;border:none;border-radius:50%;width:22px;height:22px;font-size:.7rem;color:#E05A5A;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* 앱 */
#app{display:none;}
header{color:white;text-align:center;padding:18px 16px 14px;position:relative;overflow:hidden;}
header::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 10px,rgba(255,255,255,.04) 10px,rgba(255,255,255,.04) 20px);}
header h1{font-family:'Jua',sans-serif;font-size:1.7rem;position:relative;}
header p{font-size:.78rem;opacity:.85;margin-top:3px;position:relative;}
.back-btn{position:absolute;left:14px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.2);border:none;border-radius:50%;width:36px;height:36px;font-size:1.1rem;color:white;cursor:pointer;z-index:2;}
.sync-dot{position:absolute;right:14px;top:50%;transform:translateY(-50%);width:10px;height:10px;border-radius:50%;background:#aaa;z-index:2;transition:background .3s;}
.sync-dot.on{background:#69F0AE;box-shadow:0 0 6px #69F0AE;}

/* 상태바 */
#status-bar{background:white;border-bottom:3px solid var(--warm);padding:9px 12px;position:sticky;top:0;z-index:150;box-shadow:0 2px 10px rgba(0,0,0,.08);}
.sb-top{font-family:'Jua',sans-serif;font-size:.75rem;color:var(--c1);margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;}
.sb-top button{font-family:'Jua',sans-serif;font-size:.68rem;background:var(--warm);border:none;border-radius:20px;padding:3px 10px;color:var(--c1);cursor:pointer;}
#status-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;}
#status-scroll::-webkit-scrollbar{display:none;}
.status-chip{flex-shrink:0;background:#F9F9F9;border-radius:13px;padding:8px 11px;min-width:115px;border-left:4px solid var(--warm);}
.status-chip.s-waiting{border-left-color:var(--orange);}
.status-chip.s-making{border-left-color:var(--blue);background:#EEF7FF;}
.status-chip.s-ready{border-left-color:var(--green);background:#EDFFF5;animation:pulseC 1.5s infinite;}
@keyframes pulseC{0%,100%{box-shadow:0 0 0 0 rgba(76,175,125,.3);}50%{box-shadow:0 0 0 5px rgba(76,175,125,0);}}
.chip-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px;}
.chip-num{font-family:'Jua',sans-serif;font-size:.9rem;color:var(--c2);}
.chip-pname{font-size:.75rem;color:var(--c2);font-weight:700;margin-bottom:2px;}
.chip-pill{font-size:.58rem;font-family:'Jua',sans-serif;padding:2px 7px;border-radius:20px;color:white;}
.chip-pill.waiting{background:var(--orange);}.chip-pill.making{background:var(--blue);}.chip-pill.ready{background:var(--green);}
.chip-items{font-size:.7rem;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:125px;}
.chip-btn{display:block;width:100%;margin-top:5px;border:none;border-radius:7px;padding:4px;font-family:'Jua',sans-serif;font-size:.68rem;cursor:pointer;}
.chip-btn.b-making{background:#D6EEFF;color:#1A6FA8;}.chip-btn.b-ready{background:#D6F5E6;color:#1A7A45;}.chip-btn.b-done{background:#F0F0F0;color:#888;}
.status-empty{flex-shrink:0;min-width:120px;padding:10px 13px;background:#F9F9F9;border-radius:13px;border:2px dashed var(--warm);font-family:'Jua',sans-serif;font-size:.76rem;color:var(--c1);opacity:.5;}

/* 탭 */
.tabs{display:flex;background:white;border-bottom:3px solid var(--warm);box-shadow:0 2px 8px rgba(0,0,0,.06);}
.tab-btn{flex:1;padding:10px 4px;border:none;background:none;font-family:'Jua',sans-serif;font-size:.78rem;cursor:pointer;color:var(--c1);transition:all .2s;}
.tab-btn.active{color:white;}
.tab-btn span{display:block;font-size:1.1rem;}
.section{display:none;padding:14px;max-width:600px;margin:0 auto;padding-bottom:100px;}
.section.active{display:block;}
.section-title{font-family:'Jua',sans-serif;color:var(--c2);font-size:1.05rem;margin-bottom:12px;display:flex;align-items:center;gap:7px;}

/* 메뉴판 */
.category-label{font-family:'Jua',sans-serif;color:var(--c2);font-size:1.05rem;margin:18px 0 9px;display:flex;align-items:center;gap:8px;}
.category-label::after{content:'';flex:1;height:2px;background:linear-gradient(to right,var(--warm),transparent);}
.menu-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px;}
.menu-card{background:white;border-radius:16px;padding:14px 10px;text-align:center;box-shadow:0 4px 12px rgba(0,0,0,.07);cursor:pointer;transition:transform .18s,box-shadow .18s;border:2px solid transparent;position:relative;overflow:hidden;}
.menu-card:hover{transform:translateY(-3px);}.menu-card:active{transform:scale(.96);}
.menu-card.selected{border-color:var(--accent);background:#FFF3EE;}
.menu-card .emoji{font-size:2.2rem;line-height:1;}.menu-card .name{font-family:'Jua',sans-serif;font-size:.92rem;margin:5px 0 3px;color:var(--c2);}.menu-card .price{font-size:.8rem;color:var(--c1);font-weight:700;}
.menu-card .badge{position:absolute;top:7px;right:7px;background:var(--accent);color:white;font-size:.6rem;font-family:'Jua',sans-serif;padding:2px 7px;border-radius:20px;}

/* 장바구니 */
.empty-msg{text-align:center;padding:44px 20px;color:var(--c1);opacity:.55;font-family:'Jua',sans-serif;font-size:1rem;}
.empty-msg .big{font-size:2.6rem;margin-bottom:9px;}
.cart-item{background:white;border-radius:13px;padding:13px 14px;margin-bottom:9px;display:flex;align-items:center;gap:11px;box-shadow:0 2px 9px rgba(0,0,0,.07);}
.cart-item .ci-emoji{font-size:1.7rem;line-height:1;}.cart-item .ci-info{flex:1;}.cart-item .ci-name{font-family:'Jua',sans-serif;color:var(--c2);}.cart-item .ci-price{font-size:.8rem;color:var(--c1);}
.ci-qty{display:flex;align-items:center;gap:7px;}
.qty-btn{width:28px;height:28px;border-radius:50%;border:2px solid var(--warm);background:none;font-size:1rem;cursor:pointer;color:var(--c1);display:flex;align-items:center;justify-content:center;}
.qty-btn:hover{background:var(--warm);}
.qty-num{font-family:'Jua',sans-serif;font-size:1rem;min-width:18px;text-align:center;}
.cart-total-box{border-radius:14px;padding:14px 18px;margin-top:14px;display:flex;justify-content:space-between;align-items:center;font-family:'Jua',sans-serif;color:white;}
.cart-total-box .total-price{font-size:1.35rem;}
.order-btn{width:100%;margin-top:10px;color:white;border:none;border-radius:13px;padding:15px;font-family:'Jua',sans-serif;font-size:1.05rem;cursor:pointer;transition:transform .18s;background:linear-gradient(135deg,var(--accent),#E05A3A);box-shadow:0 4px 14px rgba(255,140,105,.35);}
.order-btn:hover{transform:translateY(-2px);}

/* 접수형 */
.reception-form{background:white;border-radius:20px;padding:20px;box-shadow:0 4px 16px rgba(0,0,0,.08);}
.reception-form h3{font-family:'Jua',sans-serif;color:var(--c2);font-size:1.1rem;margin-bottom:16px;}
.form-row{margin-bottom:14px;}
.form-row label{display:block;font-size:.85rem;color:var(--c1);margin-bottom:5px;font-weight:700;}
.form-row input{width:100%;padding:11px 14px;border:2px solid var(--warm);border-radius:10px;font-family:'Nanum Gothic',sans-serif;font-size:1rem;outline:none;transition:border-color .2s;background:var(--bg);}
.form-row input:focus{border-color:var(--c1);}
.items-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.item-check{display:flex;align-items:center;gap:8px;background:var(--bg);border:2px solid var(--warm);border-radius:11px;padding:10px 12px;cursor:pointer;transition:all .18s;user-select:none;}
.item-check:hover{border-color:var(--accent);}.item-check.checked{border-color:var(--c1);background:#E8F4FF;}
.ic-box{width:20px;height:20px;border:2px solid var(--warm);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0;}
.item-check.checked .ic-box{color:white;}
.ic-emoji{font-size:1.3rem;}.ic-info{flex:1;}.ic-name{font-family:'Jua',sans-serif;font-size:.83rem;color:var(--c2);}.ic-price{font-size:.7rem;color:var(--c1);}
.memo-input{width:100%;padding:10px 14px;border:2px solid var(--warm);border-radius:10px;font-family:'Nanum Gothic',sans-serif;font-size:.9rem;outline:none;resize:none;background:var(--bg);}
.memo-input:focus{border-color:var(--c1);}
.submit-reception{width:100%;padding:15px;color:white;border:none;border-radius:13px;font-family:'Jua',sans-serif;font-size:1.05rem;cursor:pointer;margin-top:4px;transition:transform .18s;}
.submit-reception:hover{transform:translateY(-2px);}

/* 대기현황 */
.wait-number-display{border-radius:18px;padding:18px;margin-bottom:16px;text-align:center;color:white;}
.wnd-label{font-family:'Jua',sans-serif;font-size:.85rem;opacity:.8;margin-bottom:6px;}
.wnd-nums{display:flex;justify-content:center;gap:28px;}
.wnd-sub{font-size:.72rem;opacity:.75;font-family:'Jua',sans-serif;margin-bottom:2px;}
.wnd-num{font-family:'Jua',sans-serif;font-size:2.8rem;}
.wnd-num.wn-wait{color:#FFD54F;}.wnd-num.wn-make{color:#80D8FF;}.wnd-num.wn-done{color:#69F0AE;}
.wait-card{background:white;border-radius:18px;padding:16px;margin-bottom:12px;box-shadow:0 4px 14px rgba(0,0,0,.08);border-left:5px solid var(--warm);animation:slideIn .3s ease;}
@keyframes slideIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.wait-card.s-waiting{border-left-color:var(--orange);}.wait-card.s-making{border-left-color:var(--blue);}.wait-card.s-ready{border-left-color:var(--green);background:#F0FFF8;}
.wc-top{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.wc-num{font-family:'Jua',sans-serif;font-size:2rem;color:var(--c2);min-width:44px;}
.wc-info{flex:1;}.wc-name{font-family:'Jua',sans-serif;font-size:1.05rem;color:var(--c2);}.wc-time{font-size:.75rem;color:#888;}
.status-pill{font-family:'Jua',sans-serif;font-size:.76rem;padding:4px 12px;border-radius:20px;color:white;}
.status-pill.waiting{background:var(--orange);}.status-pill.making{background:var(--blue);}.status-pill.ready{background:var(--green);}
.wc-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
.wc-tag{background:var(--bg);border:1px solid var(--warm);border-radius:20px;padding:4px 10px;font-size:.8rem;color:var(--c2);}
.wc-memo{background:#F9F9F9;border-radius:8px;padding:8px 12px;font-size:.82rem;color:#555;margin-bottom:8px;}
.wc-receipt{border-radius:12px;padding:12px;margin-bottom:10px;border:2px solid var(--green);background:#F0FFF8;}
.wc-receipt h4{font-family:'Jua',sans-serif;font-size:.9rem;margin-bottom:8px;color:var(--green);}
.receipt-row{display:flex;justify-content:space-between;font-size:.82rem;margin-bottom:4px;color:#444;}
.receipt-total{display:flex;justify-content:space-between;font-family:'Jua',sans-serif;font-size:1rem;margin-top:8px;padding-top:8px;border-top:2px dashed var(--green);color:var(--c2);}
.wc-actions{display:flex;gap:8px;margin-top:8px;}
.action-btn{flex:1;padding:10px;border:none;border-radius:10px;font-family:'Jua',sans-serif;font-size:.83rem;cursor:pointer;transition:transform .15s;}
.action-btn:active{transform:scale(.96);}
.btn-making{background:#D6EEFF;color:#1A6FA8;}.btn-ready{background:#D6F5E6;color:#1A7A45;}.btn-cancel{background:#FFE5E5;color:var(--red);}

/* 관리 */
.manage-top-btn{text-align:right;margin-bottom:10px;}
.manage-top-btn button{background:#FFE5E5;border:none;border-radius:10px;padding:8px 14px;font-family:'Jua',sans-serif;font-size:.8rem;color:var(--red);cursor:pointer;}
.add-form{background:white;border-radius:18px;padding:18px;margin-bottom:18px;box-shadow:0 4px 14px rgba(0,0,0,.07);}
.add-form h3{font-family:'Jua',sans-serif;color:var(--c2);margin-bottom:12px;font-size:1.05rem;}
.mform-row{margin-bottom:11px;}
.mform-row label{display:block;font-size:.82rem;color:var(--c1);margin-bottom:3px;font-weight:700;}
.mform-row input,.mform-row select{width:100%;padding:9px 13px;border:2px solid var(--warm);border-radius:9px;font-family:'Nanum Gothic',sans-serif;font-size:.92rem;outline:none;transition:border-color .2s;background:var(--bg);}
.mform-row input:focus,.mform-row select:focus{border-color:var(--c1);}
/* 이모지 탭 */
.emoji-tabs{display:flex;gap:6px;margin-bottom:8px;}
.etab{flex:1;padding:7px 4px;border:2px solid var(--warm);border-radius:9px;background:var(--bg);font-family:'Jua',sans-serif;font-size:.78rem;color:var(--c1);cursor:pointer;text-align:center;transition:all .15s;}
.etab.active{border-color:var(--c1);background:var(--warm);}
.emoji-picker{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
.ep-btn{font-size:1.3rem;background:var(--bg);border:2px solid transparent;border-radius:7px;padding:4px;cursor:pointer;transition:all .15s;}
.ep-btn:hover,.ep-btn.selected{border-color:var(--c1);background:var(--warm);}
.emoji-direct-input{width:100%;padding:9px 13px;border:2px solid var(--warm);border-radius:9px;font-size:1.6rem;outline:none;background:var(--bg);text-align:center;transition:border-color .2s;}
.emoji-direct-input:focus{border-color:var(--c1);}
.emoji-img-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;}
.emoji-img-preview{width:72px;height:72px;border-radius:12px;object-fit:cover;border:3px solid var(--c1);display:none;}
.emoji-img-preview.show{display:block;}
.emoji-img-placeholder{width:72px;height:72px;border-radius:12px;border:2px dashed var(--warm);display:flex;align-items:center;justify-content:center;font-size:2rem;background:var(--bg);}
.upload-btn-label{display:inline-block;padding:9px 20px;border:2px solid var(--warm);border-radius:9px;background:var(--bg);font-family:'Jua',sans-serif;font-size:.85rem;color:var(--c1);cursor:pointer;transition:all .15s;}
.upload-btn-label:hover{border-color:var(--c1);background:var(--warm);}
.icon-preview-row{margin-top:10px;display:flex;align-items:center;gap:8px;}
.icon-preview-row span{font-family:'Jua',sans-serif;font-size:.8rem;color:var(--c1);}
#icon-preview{font-size:1.8rem;min-width:40px;text-align:center;}
.manage-submit{width:100%;padding:12px;color:white;border:none;border-radius:11px;font-family:'Jua',sans-serif;font-size:.97rem;cursor:pointer;margin-top:4px;}
.manage-item{background:white;border-radius:11px;padding:11px 13px;margin-bottom:7px;display:flex;align-items:center;gap:9px;box-shadow:0 2px 7px rgba(0,0,0,.06);}
.manage-item .mi-emoji{font-size:1.5rem;line-height:1;min-width:28px;}.manage-item .mi-info{flex:1;}.manage-item .mi-name{font-family:'Jua',sans-serif;color:var(--c2);}.manage-item .mi-meta{font-size:.76rem;color:var(--c1);}
.del-btn{background:#FFE5E5;border:none;border-radius:7px;padding:5px 9px;cursor:pointer;font-size:.8rem;color:var(--red);}
.del-btn:hover{background:#FFD0D0;}

/* FAB */
.order-fab{position:fixed;bottom:22px;right:18px;color:white;border:none;border-radius:50px;padding:13px 20px;font-family:'Jua',sans-serif;font-size:.95rem;cursor:pointer;display:flex;align-items:center;gap:7px;transition:transform .2s;z-index:200;background:linear-gradient(135deg,var(--accent),#E05A3A);box-shadow:0 6px 18px rgba(255,140,105,.4);}
.order-fab:hover{transform:scale(1.05);}
.order-fab .count{background:white;color:var(--accent);border-radius:50%;width:22px;height:22px;font-size:.8rem;display:flex;align-items:center;justify-content:center;}
.toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%) translateY(30px);background:#333;color:white;padding:11px 22px;border-radius:50px;font-family:'Jua',sans-serif;font-size:.9rem;opacity:0;pointer-events:none;transition:all .3s;z-index:700;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:400;align-items:center;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal{background:white;border-radius:22px;padding:26px 22px;max-width:310px;width:90%;text-align:center;animation:popIn .3s ease;}
@keyframes popIn{from{transform:scale(.7);opacity:0;}to{transform:scale(1);opacity:1;}}
.modal .modal-icon{font-size:2.8rem;}.modal h3{font-family:'Jua',sans-serif;color:var(--c2);font-size:1.2rem;margin:10px 0 7px;}.modal p{color:var(--c1);font-size:.88rem;margin-bottom:18px;}
.modal-btns{display:flex;gap:9px;}
.modal-btns button{flex:1;padding:12px;border:none;border-radius:11px;font-family:'Jua',sans-serif;font-size:.92rem;cursor:pointer;}
.modal-cancel{background:var(--warm);color:var(--c1);}.modal-confirm{color:white;}
.ready-banner{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.5);align-items:center;justify-content:center;}
.ready-banner.show{display:flex;}
.ready-box{background:white;border-radius:26px;padding:32px 24px;text-align:center;max-width:290px;width:90%;animation:popIn .4s cubic-bezier(.175,.885,.32,1.275);}
.rb-icon{font-size:3.5rem;display:inline-block;animation:ring 1s infinite;}
@keyframes ring{0%,100%{transform:rotate(0);}20%{transform:rotate(-15deg);}40%{transform:rotate(15deg);}60%{transform:rotate(-10deg);}80%{transform:rotate(10deg);}}
.ready-box h2{font-family:'Jua',sans-serif;font-size:1.5rem;color:var(--c2);margin:10px 0 4px;}
.ready-box .rb-num{font-family:'Jua',sans-serif;font-size:2rem;color:var(--accent);}
.ready-box .rb-pname{font-family:'Jua',sans-serif;font-size:1.1rem;color:var(--c2);margin-bottom:6px;}
.ready-box .rb-sub{color:var(--c1);font-size:.87rem;margin-bottom:17px;}
.ready-close{color:white;border:none;border-radius:12px;padding:12px 28px;font-family:'Jua',sans-serif;font-size:.95rem;cursor:pointer;}

<body>

<!-- 테마 선택 -->
<div id="theme-screen">
  <h1>🎭 우리반 역할놀이</h1>
  <p>오늘은 어떤 놀이를 할까요?</p>
  <div class="theme-grid" id="theme-grid"></div>
  <button class="add-theme-fab" onclick="openAddThemeModal()">➕ 새 놀이 추가</button>
</div>

<!-- 새 놀이 추가 모달 -->
<div id="add-theme-modal">
  <div class="atm-box">
    <h2 id="atm-title">🎭 새 놀이 추가</h2>

    <div class="atm-row">
      <label>기존 놀이 복사하기 (선택)</label>
      <div class="copy-grid" id="copy-grid"></div>
    </div>

    <div class="atm-row">
      <label>놀이 아이콘</label>
      <input type="text" id="atm-icon" maxlength="2" placeholder="예: 🏖️" style="font-size:1.4rem;text-align:center">
    </div>
    <div class="atm-row">
      <label>놀이 이름</label>
      <input type="text" id="atm-name" placeholder="예: 해변 카페">
    </div>
    <div class="atm-row">
      <label>한 줄 설명</label>
      <input type="text" id="atm-sub" placeholder="예: 어서오세요! 🌊">
    </div>
    <div class="atm-row">
      <label>놀이 유형</label>
      <select id="atm-type">
        <option value="normal">🛒 주문형 (카페·식당·마트 등)</option>
        <option value="reception">📋 접수형 (병원·약국 등)</option>
      </select>
    </div>
    <div class="atm-row">
      <label>테마 색상</label>
      <div class="color-row" id="color-row"></div>
    </div>
    <div class="atm-btns">
      <button class="atm-cancel" onclick="closeAddThemeModal()">취소</button>
      <button class="atm-save" onclick="saveNewTheme()">✅ 추가!</button>
    </div>
  </div>
</div>

<!-- 메인 앱 -->
<div id="app">
  <header id="app-header">
    <button class="back-btn" onclick="goBack()">←</button>
    <h1 id="app-title"></h1>
    <p id="app-sub"></p>
    <div class="sync-dot" id="sync-dot"></div>
  </header>
  <div id="status-bar">
    <div class="sb-top">📋 <span id="order-label">현황</span><button onclick="clearDone()">✅ 완료 비우기</button></div>
    <div id="status-scroll"></div>
  </div>
  <div class="tabs" id="app-tabs"></div>

  <!-- 일반형 탭 -->
  <div id="tab-menu" class="section active"><div id="menu-list"></div></div>
  <div id="tab-cart" class="section">
    <p class="section-title" id="cart-section-title">🛒 목록</p>
    <div id="cart-list"></div>
    <div id="cart-total-wrap" style="display:none">
      <div class="cart-total-box" id="cart-total-box">
        <span id="total-label">💰 합계</span>
        <span class="total-price" id="total-price">0원</span>
      </div>
      <button class="order-btn" id="order-btn" onclick="openModal()">주문!</button>
    </div>
  </div>

  <!-- 접수형 탭 -->
  <div id="tab-reception" class="section">
    <div class="reception-form">
      <h3 id="reception-title">접수</h3>
      <div class="form-row"><label id="name-label">👤 이름</label><input type="text" id="patient-name" placeholder="이름을 입력해 주세요"></div>
      <div class="form-row"><label id="items-label">항목 선택</label><div class="items-grid" id="items-grid"></div></div>
      <div class="form-row"><label id="memo-label">📝 메모</label><textarea class="memo-input" id="patient-memo" rows="2" placeholder="예: 열이 나요..."></textarea></div>
      <button class="submit-reception" id="submit-reception" onclick="submitReception()">✅ 접수 완료!</button>
    </div>
  </div>
  <div id="tab-waitlist" class="section">
    <div class="wait-number-display" id="wait-number-display">

        <div><div class="wnd-sub" id="wnd-sub-done">완료</div><div class="wnd-num wn-done" id="cnt-ready">0</div></div>
      </div>
    </div>

  </div>

  <!-- 관리 탭 (공통) -->

    <div class="manage-top-btn">
      <button onclick="resetToDefault()">🔄 기본 메뉴로 초기화</button>
    </div>
    <div class="add-form">

      <div class="mform-row">
        <label>아이콘</label>
        <div class="emoji-tabs">

          <button class="etab" onclick="switchETab('type')">⌨️ 직접입력</button>
          <button class="etab" onclick="switchETab('img')">🖼️ 이미지</button>
        </div>
        <div id="etab-pick"><div class="emoji-picker" id="emoji-picker"></div></div>
        <div id="etab-type" style="display:none">
          <input class="emoji-direct-input" id="emoji-direct" maxlength="4" placeholder="이모지 또는 텍스트" oninput="selEmoji=this.value||'☕';updateIconPreview()">
          <div style="font-size:.75rem;color:var(--c1);margin-top:5px;opacity:.7">이모지 하나 또는 짧은 텍스트</div>
        </div>
        <div id="etab-img" style="display:none">
          <div class="emoji-img-wrap">
            <div id="emoji-img-placeholder" class="emoji-img-placeholder">🖼️</div>
            <img id="emoji-img-preview" class="emoji-img-preview" src="" alt="미리보기">
            <label class="upload-btn-label">📁 사진 선택<input type="file" accept="image/*" style="display:none" onchange="onImageUpload(this)"></label>
          </div>
        </div>
        <div class="icon-preview-row">
          <span>선택된 아이콘:</span>
          <span id="icon-preview">☕</span>
        </div>
      </div>
      <div class="mform-row"><label id="lbl-name">이름</label><input type="text" id="new-name" placeholder="이름"></div>
      <div class="mform-row"><label id="lbl-price">가격(원)</label><input type="number" id="new-price" placeholder="0"></div>
      <div class="mform-row"><label>카테고리</label><select id="new-cat"></select></div>
      <button class="manage-submit" id="manage-submit-btn" onclick="addItem()">✅ 추가!</button>
    </div>
    <p class="section-title" id="manage-list-title">📋 목록</p>
    <div id="manage-list"></div>
  </div>

  <button class="order-fab" id="order-fab" onclick="showTab('cart')" style="display:none">
    <span id="fab-icon">🛒</span><span id="fab-text">보기</span>
    <span class="count" id="cart-count">0</span>
  </button>
</div>

<div class="toast" id="toast"></div>
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-icon" id="modal-icon">🔔</div>
    <h3 id="modal-title">확인</h3><p id="modal-summary"></p>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">취소</button>

    </div>
  </div>
</div>
<div class="ready-banner" id="ready-banner">

    <span class="rb-icon" id="rb-icon">🔔</span>

</div>

    s.type='module';
    s.textContent=`

      import {getDatabase,ref,set,onValue,remove,update} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        apiKey:"AIzaSyCoFMzVk97ac_N5P6ljMLzbysWDSa-x8e0",
        authDomain:"project-3751159503404548440.firebaseapp.com",
        databaseURL:"https://project-3751159503404548440-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId:"project-3751159503404548440",
        storageBucket:"project-3751159503404548440.firebasestorage.app",
        messagingSenderId:"853435785529",
        appId:"1:853435785529:web:332bec7c007451fcb088e8"
      });
      const db=getDatabase(app);
      onValue(ref(db,'.info/connected'),snap=>{
        const dot=document.getElementById('sync-dot');
        if(dot) dot.classList.toggle('on',snap.val()===true);
      });
      window._fb={db,ref,set,onValue,remove,update};
      window.dispatchEvent(new Event('fbReady'));
    `;
    document.head.appendChild(s);
    window.addEventListener('fbReady',()=>{
      const fb=window._fb;
      fbDB=fb.db; fbRef=fb.ref; fbSet=fb.set;
      fbOnValue=fb.onValue; fbRemove=fb.remove; fbUpdate=fb.update;
      resolve();

    setTimeout(resolve, 5000);
  });
}

function getCustomThemes(){ try{return JSON.parse(localStorage.getItem('custom_themes')||'{}');}catch(e){return {};} }
function saveCustomThemes(obj){ localStorage.setItem('custom_themes',JSON.stringify(obj)); }

function renderThemeScreen(){
  const custom=getCustomThemes();
  const allThemes={...THEMES,...custom};
  document.getElementById('theme-grid').innerHTML=
    Object.entries(allThemes).map(([k,t])=>{
      const isCustom=!!custom[k];
      const delBtn=isCustom?`<button class="theme-del-btn" onclick="deleteCustomTheme('${k}',event)" title="삭제">✕</button>`:'';
      return `<div class="theme-card-wrap">
        <div class="theme-card" onclick="selectTheme('${k}')">
          <div class="tc-icon">${t.name.split(' ')[0]}</div>
          <div class="tc-name">${t.name.split(' ').slice(1).join(' ')}</div>
        </div>${delBtn}
      </div>`;
    }).join('');
}

function deleteCustomTheme(key, e){
  e.stopPropagation();
  if(!confirm('이 놀이를 삭제할까요?')) return;
  const custom=getCustomThemes();
  delete custom[key];
  saveCustomThemes(custom);
  renderThemeScreen();
}

function selectCopy(key){
  copiedKey=copiedKey===key?null:key;
  document.querySelectorAll('.copy-btn').forEach(b=>b.classList.remove('selected'));
  if(copiedKey){
    document.getElementById('copy-btn-'+key).classList.add('selected');
    // 복사된 테마 정보 자동 채우기
    const allThemes={...THEMES,...getCustomThemes()};
    const t=allThemes[key];
    const nameParts=t.name.split(' ');
    document.getElementById('atm-icon').value=nameParts[0];
    document.getElementById('atm-name').value=nameParts.slice(1).join(' ');
    document.getElementById('atm-sub').value=t.sub||'';
    document.getElementById('atm-type').value=t.type||'normal';
  }
}

function selectColor(idx){
  selColorIdx=idx;
  document.querySelectorAll('.color-swatch').forEach((s,i)=>s.classList.toggle('selected',i===idx));
}

function saveNewTheme(){
  const icon=document.getElementById('atm-icon').value.trim();
  const name=document.getElementById('atm-name').value.trim();
  const sub=document.getElementById('atm-sub').value.trim();
  const type=document.getElementById('atm-type').value;
  if(!icon){showToast('⚠️ 아이콘을 입력해 주세요!');return;}
  if(!name){showToast('⚠️ 이름을 입력해 주세요!');return;}

  const col=THEME_COLORS[selColorIdx];
  const newKey='custom_'+Date.now();

  // 복사 기반이면 원본 테마 데이터 가져오기, 아니면 유형별 기본값
  const allThemes={...THEMES,...getCustomThemes()};
  const base=copiedKey?{...allThemes[copiedKey]}:(type==='normal'?{...THEMES.cafe}:{...THEMES.hospital});

  const newTheme={
    ...base,
    name:`${icon} ${name}`,
    sub:sub||`${name} 역할놀이를 시작해요!`,
    type,
    c1:col.c1, c2:col.c2, bg:col.bg, warm:col.warm,
    // 복사 기반이면 메뉴도 복사, 아니면 기본 메뉴 유지
    defaultItems: copiedKey ? [...(base.defaultItems||[])] : [...(base.defaultItems||[])],
  };

  const custom=getCustomThemes();
  custom[newKey]=newTheme;
  saveCustomThemes(custom);
  closeAddThemeModal();
  renderThemeScreen();
  showToast('✅ '+newTheme.name+' 추가됐어요!');
}

async function selectTheme(key){
  KEY=key;
  const custom=getCustomThemes();
  T=THEMES[key]||custom[key];
  if(!T){showToast('⚠️ 테마를 찾을 수 없어요');return;}

  // 1. UI 즉시 적용
  applyThemeUI();
  document.getElementById('theme-screen').style.display='none';
  document.getElementById('app').style.display='block';

  // 2. 기본 메뉴 즉시 표시 (로컬 우선)
  items=T.defaultItems.map(i=>({...i}));
  orders=[];
  orderNum=1;
  cart={};
  selEmoji='☕';
  checkedItems=new Set();

  const firstTab=T.type==='normal'?'menu':'reception';
  showTab(firstTab);
  renderStatusBar();
  updateFab();

  // 3. Firebase 연결 (백그라운드)
  if(!fbDB) await initFirebase();

  if(fbDB){
    // 아이템 리스너
    if(itemsUnsub) itemsUnsub();
    itemsUnsub=fbOnValue(fbRef(fbDB,`themes/${KEY}/items`),snap=>{
      const val=snap.val();
      if(val && Object.keys(val).length>0){
        items=Object.values(val);
      } else {
        // Firebase 비어있으면 기본값 저장
        items=T.defaultItems.map(i=>({...i}));
        const obj={}; items.forEach(i=>obj[i.id]=i);
        fbSet(fbRef(fbDB,`themes/${KEY}/items`),obj);
      }
      renderMenu(); renderItemsGrid(); renderManage();
    });

    // 주문 리스너
    if(ordersUnsub) ordersUnsub();
    ordersUnsub=fbOnValue(fbRef(fbDB,`themes/${KEY}/orders`),snap=>{
      const val=snap.val();
      orders=val?Object.values(val).sort((a,b)=>a.id-b.id):[];
      orderNum=orders.length?Math.max(...orders.map(o=>o.number||0),0)+1:1;
      renderStatusBar();
      renderWaitlist();
    });

    // 소리 신호 리스너 — 다른 기기의 소리 감지
    const soundRef=fbRef(fbDB,`themes/${KEY}/sound`);
    fbOnValue(soundRef, snap=>{
      const val=snap.val();
      if(!val) return;
      const now=Date.now();
      // 3초 이내 신호만 처리 (오래된 신호 무시)
      if(now - val.time > 3000) return;
      // 내가 보낸 신호는 무시
      if(val.sender===_deviceId) return;
      if(val.type==='order'){
        playAcceptSound();
        setTimeout(()=>speak(`${val.num}${T.acceptSpeak||'번 주문이 접수됐습니다'}`+(val.name?`. ${val.name} 님`:'')),300);
      } else if(val.type==='ready'){
        playBell();
        const base=T.readySpeak||'번 손님, 준비됐습니다. 찾아가세요';
        setTimeout(()=>speak(`${val.num}${base}`+(val.name?`. ${val.name} 님`:'')),500);
      }
    });
  }
}

      <button class="tab-btn" onclick="showTab('waitlist')"><span>${T.tiWait}</span>${T.ttWait}</button>
      <button class="tab-btn" onclick="showTab('manage')"><span>✏️</span>항목관리</button>`;
  }
}

function goBack(){
  if(itemsUnsub){itemsUnsub();itemsUnsub=null;}
  if(ordersUnsub){ordersUnsub();ordersUnsub=null;}
  document.getElementById('app').style.display='none';
  document.getElementById('theme-screen').style.display='flex';
}

// ── 탭 전환 ──
function showTab(tab){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>{b.classList.remove('active');b.style.background='';b.style.color='';});
  document.getElementById('tab-'+tab).classList.add('active');
  const list=T.type==='normal'?['menu','cart','waitlist','manage']:['reception','waitlist','manage'];
  const idx=list.indexOf(tab);
  if(idx>=0){const b=document.querySelectorAll('.tab-btn')[idx];b.classList.add('active');b.style.background=T.c1;b.style.color='white';}
  if(tab==='menu') renderMenu();
  if(tab==='cart') renderCart();
  if(tab==='reception') renderItemsGrid();
  if(tab==='waitlist') renderWaitlist();
  if(tab==='manage') renderManage();
}

// ── 이모지 헬퍼 ──
function emojiHTML(e,size='2.2rem'){
  if(e&&e.startsWith('data:')) return `<img src="${e}" style="width:${size};height:${size};border-radius:8px;object-fit:cover;vertical-align:middle">`;
  return `<span style="font-size:${size};line-height:1">${e||'?'}</span>`;
}

// ── 상태바 ──
function renderStatusBar(){
  // 주문현황 탭 뱃지 업데이트 (일반형)
  if(T && T.type==='normal'){
    const activeCount=orders.filter(o=>o.status!=='done').length;
    const tabs=document.querySelectorAll('.tab-btn');
    if(tabs[2]){
      const existing=tabs[2].querySelector('.tab-badge');
      if(existing) existing.remove();
      if(activeCount>0){
        const badge=document.createElement('span');
        badge.className='tab-badge';
        badge.textContent=activeCount;
        badge.style.cssText='position:absolute;top:4px;right:4px;background:var(--accent);color:white;font-size:.6rem;min-width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:Jua,sans-serif;';
        tabs[2].style.position='relative';
        tabs[2].appendChild(badge);
      }
    }
  }
  const sc=document.getElementById('status-scroll');
  const active=orders.filter(o=>o.status!=='done');
  if(!active.length){sc.innerHTML=`<div class="status-empty">${T?T.name.split(' ')[0]:''}  대기 없음</div>`;return;}
  sc.innerHTML=active.map(o=>{
    const pill={waiting:T.chipWait,making:T.chipMake,ready:T.chipReady}[o.status];
    const nameStr=o.patientName?`<div class="chip-pname">👤 ${o.patientName}</div>`:'';
    const itemStr=(o.selectedItems||[]).map(i=>i.emoji&&i.emoji.startsWith('data:')?'🖼️':i.emoji+(i.qty>1?'×'+i.qty:'')).join(' ');
    let btn='';
    if(o.status==='waiting') btn=`<button class="chip-btn b-making" onclick="setStatus(${o.id},'making');event.stopPropagation()">${T.btnMake}</button>`;
    else if(o.status==='making') btn=`<button class="chip-btn b-ready" onclick="setStatus(${o.id},'ready');event.stopPropagation()">${T.btnReady}</button>`;
    else btn=`<button class="chip-btn b-done" onclick="setStatus(${o.id},'done');event.stopPropagation()">${T.btnDone}</button>`;
    return `<div class="status-chip s-${o.status}"><div class="chip-top"><span class="chip-num">🎫 ${o.number}번</span><span class="chip-pill ${o.status}">${pill}</span></div>${nameStr}<div class="chip-items">${itemStr}</div>${btn}</div>`;
  }).join('');
}

// ── 일반형 메뉴판 ──
function renderMenu(){
  const cats=[...new Set(items.map(i=>i.cat))];
  let html='';
  cats.forEach(cat=>{
    html+=`<div class="category-label">${cat}</div><div class="menu-grid">`;
    items.filter(i=>i.cat===cat).forEach(i=>{
      const sel=cart[i.id]?'selected':'';
      const badge=cart[i.id]?`<span class="badge">${cart[i.id]}</span>`:'';
      html+=`<div class="menu-card ${sel}" onclick="addToCart(${i.id})">${badge}
        <div class="emoji">${emojiHTML(i.emoji,'2.2rem')}</div>
        <div class="name">${i.name}</div>
        <div class="price">${i.price>0?i.price.toLocaleString()+'원':'무료'}</div></div>`;
    });
    html+='</div>';
  });
  if(!items.length) html=`<div class="empty-msg"><div class="big">🍽️</div>관리 탭에서 추가해 주세요!</div>`;
  document.getElementById('menu-list').innerHTML=html;
}
function addToCart(id){
  cart[id]=(cart[id]||0)+1; updateFab(); renderMenu();
  const i=items.find(x=>x.id===id);
  showToast((i.emoji&&!i.emoji.startsWith('data:')?i.emoji:'')+' '+i.name+' 담았어요!');

// ── 장바구니 ──
function renderCart(){
  const keys=Object.keys(cart).filter(k=>cart[k]>0);
  const listEl=document.getElementById('cart-list'),totalEl=document.getElementById('cart-total-wrap');
  if(!keys.length){listEl.innerHTML=`<div class="empty-msg"><div class="big">${T.tiCart||'🛒'}</div>아직 담은 것이 없어요!</div>`;totalEl.style.display='none';return;}
  let total=0,html='';
  keys.forEach(k=>{
    const i=items.find(x=>x.id==k);if(!i)return;
    const sub=i.price*cart[k];total+=sub;
    html+=`<div class="cart-item"><span class="ci-emoji">${emojiHTML(i.emoji,'1.7rem')}</span>
      <div class="ci-info"><div class="ci-name">${i.name}</div>
      <div class="ci-price">${i.price>0?i.price.toLocaleString()+'원 × '+cart[k]+' = '+sub.toLocaleString()+'원':'무료'}</div></div>
      <div class="ci-qty"><button class="qty-btn" onclick="changeQty(${k},-1)">−</button><span class="qty-num">${cart[k]}</span><button class="qty-btn" onclick="changeQty(${k},1)">+</button></div></div>`;
  });
  listEl.innerHTML=html;
  document.getElementById('total-price').textContent=total.toLocaleString()+'원';
  totalEl.style.display='block';
}
function changeQty(id,d){cart[id]=(cart[id]||0)+d;if(cart[id]<=0)delete cart[id];updateFab();renderCart();}
function updateFab(){
  const t=Object.values(cart).reduce((a,b)=>a+b,0);
  document.getElementById('cart-count').textContent=t;
  document.getElementById('order-fab').style.display=(T&&T.type==='normal'&&t>0)?'flex':'none';
}
function openModal(){
  const keys=Object.keys(cart).filter(k=>cart[k]>0);
  document.getElementById('modal-summary').textContent=keys.map(k=>{const i=items.find(x=>x.id==k);return i.name+' '+cart[k]+'개';}).join(', ');
  document.getElementById('modal').classList.add('show');
}
function closeModal(){document.getElementById('modal').classList.remove('show');}
function confirmOrder(){

  const keys=Object.keys(cart).filter(k=>cart[k]>0);
  let total=0;
  const si=keys.map(k=>{const i=items.find(x=>x.id==k);total+=i.price*cart[k];return{id:parseInt(k),emoji:i.emoji,name:i.name,price:i.price,qty:cart[k]};});
  const now=new Date();
  const num=orderNum++;

// ── 접수형 ──

function toggleItem(id){if(checkedItems.has(id))checkedItems.delete(id);else checkedItems.add(id);renderItemsGrid();}
function submitReception(){
  const name=document.getElementById('patient-name').value.trim();
  const memo=document.getElementById('patient-memo').value.trim();
  if(!name){showToast('⚠️ 이름을 입력해 주세요!');return;}
  if(!checkedItems.size){showToast('⚠️ 항목을 선택해 주세요!');return;}
  const si=items.filter(i=>checkedItems.has(i.id));
  const total=si.reduce((a,i)=>a+i.price,0);
  const now=new Date();
  const num=orderNum++;
  const o={id:Date.now(),number:num,patientName:name,selectedItems:si,memo,total,status:'waiting',time:`${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`};

  orders.push(o); renderStatusBar(); renderWaitlist();

  if(fbDB) fbSet(fbRef(fbDB,`themes/${KEY}/orders/${o.id}`),o).catch(e=>console.error(e));

function renderWaitlist(){
  const active=orders.filter(o=>o.status!=='done');
  document.getElementById('cnt-waiting').textContent=orders.filter(o=>o.status==='waiting').length;
  document.getElementById('cnt-making').textContent=orders.filter(o=>o.status==='making').length;
  document.getElementById('cnt-ready').textContent=orders.filter(o=>o.status==='ready').length;
  const el=document.getElementById('waitlist-cards');
  if(!active.length){el.innerHTML=`<div class="empty-msg"><div class="big">${T.tiWait}</div>대기 중인 분이 없어요!</div>`;return;}
  const sorted=[...active].sort((a,b)=>({waiting:0,making:1,ready:2}[a.status]-{waiting:0,making:1,ready:2}[b.status]));
  el.innerHTML=sorted.map(o=>{
    const pillTxt={waiting:'🟠 '+T.chipWait,making:'🔵 '+T.chipMake,ready:'🟢 '+T.chipReady}[o.status];
    const tags=(o.selectedItems||[]).map(i=>`<span class="wc-tag">${emojiHTML(i.emoji,'1rem')} ${i.name}</span>`).join('');
    const memo=o.memo?`<div class="wc-memo">${o.memo}</div>`:'';
    let receipt='',actions='';
    if(o.status==='ready'){
      const rows=(o.selectedItems||[]).map(i=>`<div class="receipt-row"><span>${i.name}</span><span>${i.price>0?i.price.toLocaleString()+'원':'무료'}</span></div>`).join('');
      receipt=`<div class="wc-receipt"><h4>${T.receiptTitle}</h4>${rows}<div class="receipt-total"><span>${T.totalReceiptLbl}</span><span>${o.total.toLocaleString()}원</span></div></div>`;
      actions=`<div class="wc-actions"><button class="action-btn btn-cancel" style="flex:1" onclick="setStatus(${o.id},'done')">${T.finalBtn}</button></div>`;
    } else if(o.status==='waiting'){
      actions=`<div class="wc-actions"><button class="action-btn btn-making" onclick="setStatus(${o.id},'making')">${T.btnMake}</button><button class="action-btn btn-cancel" onclick="cancelOrder(${o.id})">✕ 취소</button></div>`;
    } else if(o.status==='making'){
      actions=`<div class="wc-actions"><button class="action-btn btn-ready" onclick="setStatus(${o.id},'ready')">${T.btnReady}</button></div>`;
    }
    return `<div class="wait-card s-${o.status}">
      <div class="wc-top"><div class="wc-num">${o.number}</div><div class="wc-info"><div class="wc-name">👤 ${o.patientName}</div><div class="wc-time">⏰ ${o.time}</div></div><span class="status-pill ${o.status}">${pillTxt}</span></div>
      <div class="wc-tags">${tags}</div>${memo}${receipt}${actions}</div>`;
  }).join('');
}

// ── 상태 변경 ──
function setStatus(id,status){
  // 로컬 즉시 반영
  const o=orders.find(x=>x.id===id); if(!o) return;
  if(status==='done') orders=orders.filter(x=>x.id!==id);
  else o.status=status;
  renderStatusBar(); if(T.type==='reception') renderWaitlist();
  // Firebase에도 저장
  if(fbDB){
    if(status==='done') fbRemove(fbRef(fbDB,`themes/${KEY}/orders/${id}`)).catch(e=>console.error(e));
    else fbUpdate(fbRef(fbDB,`themes/${KEY}/orders/${id}`),{status}).catch(e=>console.error(e));
  }
  // 팝업: 접수형은 making(진료시작)에서, 일반형은 ready에서
  const popOn=T.type==='reception'?'making':'ready';
  if(status===popOn){
    const o=orders.find(x=>x.id===id)||{number:'',patientName:''};
    document.getElementById('rb-num').textContent='🎫 '+o.number+'번';
    document.getElementById('rb-pname').textContent=o.patientName?'👤 '+o.patientName:'';
    document.getElementById('ready-banner').classList.add('show');
    playBell();
    const base=T.readySpeak||'번 손님, 준비됐습니다. 찾아가세요';
    const txt=o.patientName?`${o.number}${base}. ${o.patientName} 님`:`${o.number}${base}`;
    setTimeout(()=>speak(txt),500);
    // 다른 기기에 소리 신호 전송
    if(fbDB) fbSet(fbRef(fbDB,`themes/${KEY}/sound`),{type:'ready',num:o.number,name:o.patientName||'',time:Date.now(),sender:_deviceId});
  }
}
function cancelOrder(id){
  orders=orders.filter(o=>o.id!==id); renderStatusBar(); if(T.type==='reception') renderWaitlist();
  if(fbDB) fbRemove(fbRef(fbDB,`themes/${KEY}/orders/${id}`)).catch(e=>console.error(e));
  showToast('🗑️ 취소됐어요');
}
function clearDone(){
  const done=orders.filter(o=>o.status==='ready'||o.status==='done');
  orders=orders.filter(o=>o.status!=='ready'&&o.status!=='done');
  renderStatusBar(); if(T.type==='reception') renderWaitlist();
  if(fbDB) done.forEach(o=>fbRemove(fbRef(fbDB,`themes/${KEY}/orders/${o.id}`)).catch(e=>console.error(e)));
  showToast('✅ 완료 비웠어요');
}
function closeReady(){document.getElementById('ready-banner').classList.remove('show');}

// ── 관리 ──
function switchETab(tab){
  curETab=tab;
  ['pick','type','img'].forEach(t=>{document.getElementById('etab-'+t).style.display=t===tab?'block':'none';});
  document.querySelectorAll('.etab').forEach((b,i)=>b.classList.toggle('active',['pick','type','img'][i]===tab));

function onImageUpload(input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    selImgData=e.target.result;
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      const MAX=100; const ratio=Math.min(MAX/img.width,MAX/img.height,1);
      canvas.width=Math.round(img.width*ratio); canvas.height=Math.round(img.height*ratio);
      canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
      selEmoji=canvas.toDataURL('image/jpeg',0.75);
      const prev=document.getElementById('emoji-img-preview');
      const ph=document.getElementById('emoji-img-placeholder');
      prev.src=selEmoji; prev.classList.add('show'); ph.style.display='none';
      updateIconPreview();
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}
function updateIconPreview(){
  const el=document.getElementById('icon-preview');
  el.innerHTML=emojiHTML(selEmoji,'1.8rem');
}
function buildEmojiPicker(){
  document.getElementById('emoji-picker').innerHTML=EMOJIS.map(e=>
    `<button class="ep-btn ${e===selEmoji?'selected':''}" onclick="selEmoji='${e}';buildEmojiPicker();updateIconPreview()">${e}</button>`
  ).join('');
  updateIconPreview();
}

// ── 효과음 ──
function playBell(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [[523,0],[659,.25],[784,.5],[659,.8]].forEach(([f,w])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);o.type='sine';o.frequency.value=f;
      g.gain.setValueAtTime(0,ctx.currentTime+w);
      g.gain.linearRampToValueAtTime(.4,ctx.currentTime+w+.05);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+w+.6);
      o.start(ctx.currentTime+w);o.stop(ctx.currentTime+w+.7);
    });
  }catch(e){}
}
function playAcceptSound(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [[880,0],[1047,.15]].forEach(([f,w])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);o.type='sine';o.frequency.value=f;
      g.gain.setValueAtTime(0,ctx.currentTime+w);
      g.gain.linearRampToValueAtTime(.3,ctx.currentTime+w+.04);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+w+.35);
      o.start(ctx.currentTime+w);o.stop(ctx.currentTime+w+.4);
    });
  }catch(e){}
}

// ── 음성 TTS ──
function numToKorean(n){
  const ones=['','일','이','삼','사','오','육','칠','팔','구'];
  const tens=['','십','이십','삼십','사십','오십','육십','칠십','팔십','구십'];
  const hundreds=['','백','이백','삼백','사백','오백','육백','칠백','팔백','구백'];
  n=parseInt(n); if(isNaN(n)||n===0)return'영';
  if(n<10)return ones[n];
  if(n<100)return tens[Math.floor(n/10)]+ones[n%10];
  return hundreds[Math.floor(n/100)]+tens[Math.floor((n%100)/10)]+ones[n%100%10];
}
function toKoreanNum(text){return text.replace(/(\d+)/g,(_,p)=>numToKorean(p));}
function speak(text){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const utt=new SpeechSynthesisUtterance(toKoreanNum(text));
  utt.lang='ko-KR';utt.rate=0.9;utt.pitch=1.1;
  const voices=window.speechSynthesis.getVoices();
  const ko=voices.find(v=>v.lang.startsWith('ko'));
  if(ko)utt.voice=ko;
  window.speechSynthesis.speak(utt);
}

// ── 토스트 ──
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

// ── 시작 ──
renderThemeScreen();
